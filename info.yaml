
# Tiny Tapeout project information
project:
  title:        "Distributed Pong"      # Project title
  author:       "llhtimlam"      # Your name
  discord:      "timlam0531"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "A learning prototype for distributed computing,  pong under same system in two different hardware!"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     25175000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x2"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_llhtimlam_DistributedPong"
  
  # List your project's source files here. Source files must be in ./src and you must list each source file separately, one per line:
  source_files:
    - "distributedpong.v"
    - "hvsync_generator.v"
    - "uart.v"
    - "config.vh"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  # Inputs
  ui[0]: "DIP Switch / Button"
  ui[1]: "DIP Switch / Button"
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "R1"
  uo[1]: "G1"
  uo[2]: "B1"
  uo[3]: "VSync"
  uo[4]: "R0"
  uo[5]: "G0"
  uo[6]: "B0"
  uo[7]: "HSync"

  # Bidirectional pins
  uio[0]: "RX<->TX uio[1] UART RX connection to TX another identical FPGA"
  uio[1]: "TX<->RX uio[0] UART TX connection to RX another identical FPGA"
  uio[2]: ""
  uio[3]: ""
  uio[4]: "RX<->TX uio[5] Reserved channel for checking status"
  uio[5]: "TX<->RX uio[4] Reserved channel for checking status"
  uio[6]: "RX<->TX uio[7] Check alive channel"
  uio[7]: "TX<->RX uio[6] Check alive channel"

# Do not change!
yaml_version: 6
